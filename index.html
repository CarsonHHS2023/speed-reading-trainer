<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速阅读训练程序</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- 顶部软件名称 -->
        <header class="app-header">
            <h1>⚡ 快速阅读训练程序</h1>
        </header>

        <div class="app-body">
            <!-- 左侧：书架栏和设置栏 -->
            <div class="left-panel">
                <!-- 书架栏 -->
                <div class="shelf-panel">
                    <div class="shelf-header">
                        <h2>📚 书架</h2>
                        <button id="addCategoryBtn" class="icon-btn" title="添加分类">➕</button>
                    </div>

                    <!-- 上传区域 -->
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-prompt">📁 拖拽或<br><label for="fileInput">点击上传</label></div>
                        <input type="file" id="fileInput" accept=".txt,.pdf" hidden>
                    </div>

                    <!-- 分类列表 -->
                    <div class="categories">
                        <div class="category" data-category="all">
                            <div class="category-header">全部<span class="book-count">0</span></div>
                        </div>
                        <div class="category" data-category="reading">
                            <div class="category-header">阅读中<span class="book-count">0</span></div>
                        </div>
                        <div class="category" data-category="finished">
                            <div class="category-header">已完成<span class="book-count">0</span></div>
                        </div>
                    </div>

                    <!-- 书籍列表 -->
                    <div class="books-list" id="booksList"></div>
                </div>

                <!-- 设置栏 -->
                <div class="settings-panel">
                    <div class="settings-header">
                        <h2>🎮 设置</h2>
                    </div>

                    <div class="settings-content">
                        <div class="setting-group">
                            <label>语言：</label>
                            <select id="language">
                                <option value="chinese">中文</option>
                                <option value="english">英文</option>
                            </select>
                        </div>

                        <div class="setting-group">
                            <label>速度：</label>
                            <div class="speed-control">
                                <input type="range" id="speedSlider" min="100" max="1000" value="300" />
                                <input type="number" id="speedInput" min="100" max="2000" value="300" />
                                <span id="speedUnit">字/分钟</span>
                            </div>
                        </div>

                        <div class="setting-group">
                            <label>行宽：</label>
                            <div class="slider-control">
                                <input type="range" id="widthSlider" min="10" max="35" value="20" />
                                <input type="number" id="widthInput" min="10" max="35" value="20" />
                            </div>
                        </div>

                        <div class="setting-group">
                            <label>行数：</label>
                            <div class="slider-control">
                                <input type="range" id="linesSlider" min="2" max="6" value="4" />
                                <input type="number" id="linesInput" min="2" max="6" value="4" />
                            </div>
                        </div>

                        <div class="setting-group">
                            <label>字体：</label>
                            <div class="slider-control">
                                <input type="range" id="fontSlider" min="16" max="48" value="28" />
                                <input type="number" id="fontInput" min="16" max="48" value="28" />
                                <span>px</span>
                            </div>
                        </div>

                        <div class="setting-group">
                            <label>模式：</label>
                            <select id="viewMode">
                                <option value="fixed">固定式</option>
                                <option value="scroll">滚动式</option>
                            </select>
                        </div>

                        <div class="button-group">
                            <button id="startBtn" class="btn btn-primary">开始</button>
                            <button id="pauseBtn" class="btn btn-secondary" disabled>暂停</button>
                            <button id="resumeBtn" class="btn btn-secondary" disabled>继续</button>
                            <button id="stopBtn" class="btn btn-secondary" disabled>停止</button>
                        </div>
                    </div>

                    <!-- 进度条 -->
                    <div class="progress-section">
                        <div class="progress-bar">
                            <div id="progressFill" class="progress-fill"></div>
                        </div>
                        <div class="progress-info">
                            <span id="currentPos">0</span> / <span id="totalWords">0</span>
                            <span class="time-display">⏱️ <span id="readingTime">00:00</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：阅读显示区 -->
            <div class="reading-panel">
                <div id="fixedModeDisplay" class="display-mode active">
                    <div id="focusText" class="focus-text">选择书籍开始阅读</div>
                </div>
                <div id="scrollModeDisplay" class="display-mode">
                    <div id="scrollContent" class="scroll-content">
                        <div id="scrollText" class="scroll-text">选择书籍开始阅读</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框：添加分类 -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加分类</h3>
                <button class="close-btn" onclick="closeCategoryModal()">&times;</button>
            </div>
            <input type="text" id="categoryInput" placeholder="输入分类名称" />
            <div class="modal-footer">
                <button onclick="closeCategoryModal()" class="btn btn-secondary">取消</button>
                <button onclick="addCategory()" class="btn btn-primary">确定</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="bookshelf.js"></script>
    <script src="app.js"></script>
</body>
</html>
