<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速阅读训练程序</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ 快速阅读训练程序</h1>
            <p>提升阅读速度，掌握知识精髓</p>
        </header>

        <div class="main-content">
            <!-- 控制面板 -->
            <div class="control-panel">
                <div class="section">
                    <h3>📁 文件上传</h3>
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" accept=".txt,.pdf" />
                        <label for="fileInput">选择TXT或PDF文件</label>
                    </div>
                    <div id="fileInfo" class="file-info"></div>
                </div>

                <div class="section">
                    <h3>⚙️ 阅读设置</h3>
                    
                    <div class="setting-group">
                        <label for="language">语言选择：</label>
                        <select id="language">
                            <option value="chinese">中文</option>
                            <option value="english">英文</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label for="speed">阅读速度：</label>
                        <div class="speed-input">
                            <input type="range" id="speedSlider" min="100" max="1000" value="300" />
                            <input type="number" id="speedInput" min="100" max="2000" value="300" />
                            <span id="speedUnit">字/分钟</span>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label for="lineWidth">行宽（字数）：</label>
                        <div class="width-input">
                            <input type="range" id="widthSlider" min="10" max="50" value="25" />
                            <input type="number" id="widthInput" min="10" max="50" value="25" />
                        </div>
                    </div>

                    <div class="setting-group">
                        <label for="lineCount">行数：</label>
                        <div class="lines-input">
                            <input type="range" id="linesSlider" min="2" max="10" value="5" />
                            <input type="number" id="linesInput" min="2" max="10" value="5" />
                        </div>
                    </div>

                    <div class="setting-group">
                        <label for="viewMode">视点移动方式：</label>
                        <select id="viewMode">
                            <option value="fixed">固定式（焦点固定）</option>
                            <option value="scroll">滚动式（页面滚动）</option>
                        </select>
                    </div>
                </div>

                <div class="section">
                    <h3>🎮 控制按钮</h3>
                    <div class="button-group">
                        <button id="startBtn" class="btn btn-primary">开始阅读</button>
                        <button id="pauseBtn" class="btn btn-secondary" disabled>暂停</button>
                        <button id="resumeBtn" class="btn btn-secondary" disabled>继续</button>
                        <button id="stopBtn" class="btn btn-secondary" disabled>停止</button>
                    </div>
                </div>

                <div class="section">
                    <h3>📊 进度统计</h3>
                    <div class="stats">
                        <div class="stat-item">
                            <span class="stat-label">当前位置：</span>
                            <span id="currentPos">0</span> / <span id="totalWords">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">阅读进度：</span>
                            <div class="progress-bar">
                                <div id="progressFill" class="progress-fill"></div>
                            </div>
                            <span id="progressText">0%</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">阅读时间：</span>
                            <span id="readingTime">00:00</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 阅读显示区域 -->
            <div class="reading-area">
                <div id="fixedModeDisplay" class="display-mode active">
                    <div class="focus-box">
                        <div id="focusText" class="focus-text">请上传文件并点击"开始阅读"</div>
                    </div>
                </div>

                <div id="scrollModeDisplay" class="display-mode">
                    <div id="scrollContent" class="scroll-content">
                        <div id="scrollText" class="scroll-text">请上传文件并点击"开始阅读"</div>
                        <div id="scrollFocus" class="scroll-focus-line"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
